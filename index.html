<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoboNexus · 登录</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="login-shell">
      <div class="login-card">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="8" width="14" height="11" rx="2.5" />
              <path d="M12 8V4" />
              <circle cx="12" cy="3" r="1.4" fill="currentColor" stroke="none" />
              <circle cx="9.2" cy="13" r="1.3" fill="currentColor" stroke="none" />
              <circle cx="14.8" cy="13" r="1.3" fill="currentColor" stroke="none" />
              <path d="M9.5 16.2h5" />
              <path d="M5 12H2.6" />
              <path d="M19 12h2.4" />
            </svg>
          </span>
          <div class="brand-text">
            <h1>RoboNexus</h1>
            <p>登录机器人控制台</p>
          </div>
        </div>

        <form id="login-form" novalidate>
          <label class="field">
            <span class="field-label">邮箱</span>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
            />
            <span class="field-error" id="email-error"></span>
          </label>

          <label class="field">
            <span class="field-label">密码</span>
            <div class="pwd-wrap">
              <input
                id="password"
                type="password"
                placeholder="请输入密码"
                autocomplete="current-password"
              />
              <button type="button" class="pwd-toggle" id="pwd-toggle" aria-label="显示密码">
                显示
              </button>
            </div>
            <span class="field-error" id="password-error"></span>
          </label>

          <div class="form-row">
            <label class="remember">
              <input type="checkbox" id="remember" />
              <span>记住我</span>
            </label>
            <a href="#forgot" class="forgot-link">忘记密码？</a>
          </div>

          <button type="submit" class="submit-btn" id="submit-btn">登录</button>
        </form>

        <div class="divider"><span>或使用以下方式登录</span></div>

        <div class="oauth-row">
          <button type="button" class="oauth-btn" data-provider="google">
            <span class="oauth-icon">G</span><span>Google</span>
          </button>
          <button type="button" class="oauth-btn" data-provider="github">
            <span class="oauth-icon">GH</span><span>GitHub</span>
          </button>
          <button type="button" class="oauth-btn" data-provider="wechat">
            <span class="oauth-icon">微</span><span>微信</span>
          </button>
        </div>

        <p class="signup-hint">
          还没有账户？<a href="#signup">立即注册</a>
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
