<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoboNexus · 组装实验室</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="builder.css" />
  </head>
  <body class="dashboard-body">
    <!-- 顶部导航栏(复用 dashboard 同款) -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="brand-mark-small" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="8" width="14" height="11" rx="2.5" />
            <path d="M12 8V4" />
            <circle cx="12" cy="3" r="1.4" fill="currentColor" stroke="none" />
            <circle cx="9.2" cy="13" r="1.3" fill="currentColor" stroke="none" />
            <circle cx="14.8" cy="13" r="1.3" fill="currentColor" stroke="none" />
            <path d="M9.5 16.2h5" />
            <path d="M5 12H2.6" />
            <path d="M19 12h2.4" />
          </svg>
        </span>
        <span class="brand-name">RoboNexus</span>
        <span class="page-tag">组装实验室</span>
      </div>
      <div class="topbar-right">
        <a href="dashboard.html" class="topbar-link">← 返回控制台</a>
        <div class="user-menu">
          <button class="user-btn" id="user-btn">
            <span class="user-avatar">A</span>
            <span class="user-name">Austin</span>
          </button>
        </div>
      </div>
    </header>

    <!-- 三栏布局：左槽位 / 中机器人 / 右属性 -->
    <div class="builder-layout">

      <!-- 左侧：槽位列表 -->
      <aside class="slot-panel">
        <div class="panel-header">
          <h2>组装槽位</h2>
          <button class="btn-ghost" id="reset-btn" title="清空所有槽位">重置</button>
        </div>
        <div class="slot-list" id="slot-list">
          <!-- JS 渲染 -->
        </div>

        <div class="quick-actions">
          <button class="btn-ghost full" id="preset-flagship">⚡ 旗舰预设</button>
          <button class="btn-ghost full" id="preset-budget">💡 经济预设</button>
        </div>
      </aside>

      <!-- 中间：机器人可视化 + 槽位热区 -->
      <main class="robot-stage">
        <div class="stage-header">
          <input
            type="text" id="robot-name" class="robot-name-input"
            placeholder="给你的机器人起个名字..." maxlength="20"
          />
          <span class="robot-form-badge" id="robot-form-badge">未选形态</span>
        </div>

        <div class="robot-canvas" id="robot-canvas">
          <!-- 机器人 SVG 由 JS 根据形态渲染 -->
        </div>

        <div class="stage-footer">
          <div class="skill-tags" id="skill-tags">
            <span class="skill-empty">装配组件后会显示机器人的技能</span>
          </div>
        </div>
      </main>

      <!-- 右侧：属性面板 -->
      <aside class="stats-panel">
        <div class="panel-header">
          <h2>综合属性</h2>
        </div>

        <!-- 评分雷达(简化为四条评分) -->
        <div class="rating-block">
          <div class="rating-row">
            <span class="rating-label">智能</span>
            <div class="rating-bar"><div class="rating-fill" id="bar-intel"></div></div>
            <span class="rating-num" id="num-intel">—</span>
          </div>
          <div class="rating-row">
            <span class="rating-label">运动</span>
            <div class="rating-bar"><div class="rating-fill" id="bar-mobi"></div></div>
            <span class="rating-num" id="num-mobi">—</span>
          </div>
          <div class="rating-row">
            <span class="rating-label">感知</span>
            <div class="rating-bar"><div class="rating-fill" id="bar-perc"></div></div>
            <span class="rating-num" id="num-perc">—</span>
          </div>
          <div class="rating-row">
            <span class="rating-label">稳定</span>
            <div class="rating-bar"><div class="rating-fill" id="bar-stab"></div></div>
            <span class="rating-num" id="num-stab">—</span>
          </div>
        </div>

        <div class="metric-grid">
          <div class="metric-cell">
            <div class="metric-label">算力</div>
            <div class="metric-value"><span id="m-compute">—</span> <small>TOPS</small></div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">功耗</div>
            <div class="metric-value"><span id="m-power">—</span> <small>W</small></div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">续航</div>
            <div class="metric-value"><span id="m-runtime">—</span> <small>h</small></div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">自由度</div>
            <div class="metric-value"><span id="m-dof">—</span> <small>DoF</small></div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">重量</div>
            <div class="metric-value"><span id="m-weight">—</span> <small>kg</small></div>
          </div>
          <div class="metric-cell">
            <div class="metric-label">成本</div>
            <div class="metric-value"><span id="m-cost">—</span> <small>万元</small></div>
          </div>
        </div>

        <!-- 兼容性提示 -->
        <div class="issues-block" id="issues-block">
          <div class="issues-empty">完成所有槽位装配后会显示兼容性提示</div>
        </div>

        <button class="btn-primary full" id="save-build-btn" disabled>保存机器人</button>
      </aside>
    </div>

    <!-- 组件选择浮层 -->
    <div class="picker-overlay" id="picker-overlay" hidden>
      <div class="picker-modal">
        <div class="picker-header">
          <h3 id="picker-title">选择组件</h3>
          <button class="picker-close" id="picker-close" aria-label="关闭">×</button>
        </div>
        <div class="picker-body" id="picker-body">
          <!-- JS 渲染候选组件卡片 -->
        </div>
      </div>
    </div>

    <script src="api.js"></script>
    <script src="robot-parts.js"></script>
    <script src="builder.js"></script>
  </body>
</html>
