<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoboNexus · 找回密码</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="login-shell">
      <div class="login-card">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="8" width="14" height="11" rx="2.5" />
              <path d="M12 8V4" />
              <circle cx="12" cy="3" r="1.4" fill="currentColor" stroke="none" />
              <circle cx="9.2" cy="13" r="1.3" fill="currentColor" stroke="none" />
              <circle cx="14.8" cy="13" r="1.3" fill="currentColor" stroke="none" />
              <path d="M9.5 16.2h5" />
              <path d="M5 12H2.6" />
              <path d="M19 12h2.4" />
            </svg>
          </span>
          <div class="brand-text">
            <h1>找回密码</h1>
            <p>输入邮箱，我们会发送重置链接</p>
          </div>
        </div>

        <form id="forgot-form" novalidate>
          <label class="field">
            <span class="field-label">邮箱</span>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
            />
            <span class="field-error" id="email-error"></span>
          </label>

          <button type="submit" class="submit-btn" id="submit-btn">发送重置链接</button>
        </form>

        <p class="form-note" id="sent-note" hidden>
          如果该邮箱已注册，重置链接会发送到你的邮箱，请查收（含垃圾箱）。
        </p>

        <p class="signup-hint">
          想起来了？<a href="index.html">返回登录</a>
        </p>
      </div>
    </div>

    <script src="forgot.js"></script>
  </body>
</html>
