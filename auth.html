<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoboNexus · 账户</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="login-shell">
      <div class="login-card">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="8" width="14" height="11" rx="2.5" />
              <path d="M12 8V4" />
              <circle cx="12" cy="3" r="1.4" fill="currentColor" stroke="none" />
              <circle cx="9.2" cy="13" r="1.3" fill="currentColor" stroke="none" />
              <circle cx="14.8" cy="13" r="1.3" fill="currentColor" stroke="none" />
              <path d="M9.5 16.2h5" />
              <path d="M5 12H2.6" />
              <path d="M19 12h2.4" />
            </svg>
          </span>
          <div class="brand-text">
            <h1 id="page-title">RoboNexus</h1>
            <p id="page-subtitle">登录机器人控制台</p>
          </div>
        </div>

        <!-- 登录表单 -->
        <form id="login-form" class="auth-form" novalidate>
          <label class="field">
            <span class="field-label">邮箱</span>
            <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email" />
            <span class="field-error" id="login-email-error"></span>
          </label>

          <label class="field">
            <span class="field-label">密码</span>
            <div class="pwd-wrap">
              <input id="login-password" type="password" placeholder="请输入密码" autocomplete="current-password" />
              <button type="button" class="pwd-toggle" data-target="login-password" aria-label="显示密码">显示</button>
            </div>
            <span class="field-error" id="login-password-error"></span>
          </label>

          <div class="form-row">
            <label class="remember"><input type="checkbox" id="remember" /><span>记住我</span></label>
            <a href="#" class="forgot-link" data-switch="forgot">忘记密码？</a>
          </div>

          <button type="submit" class="submit-btn">登录</button>
        </form>

        <!-- 注册表单 -->
        <form id="signup-form" class="auth-form" novalidate hidden>
          <label class="field">
            <span class="field-label">用户名</span>
            <input id="signup-name" type="text" placeholder="给自己起个名字" autocomplete="nickname" />
            <span class="field-error" id="signup-name-error"></span>
          </label>

          <label class="field">
            <span class="field-label">邮箱</span>
            <input id="signup-email" type="email" placeholder="you@example.com" autocomplete="email" />
            <span class="field-error" id="signup-email-error"></span>
          </label>

          <label class="field">
            <span class="field-label">密码</span>
            <div class="pwd-wrap">
              <input id="signup-password" type="password" placeholder="至少 6 位" autocomplete="new-password" />
              <button type="button" class="pwd-toggle" data-target="signup-password" aria-label="显示密码">显示</button>
            </div>
            <span class="field-error" id="signup-password-error"></span>
          </label>

          <label class="field">
            <span class="field-label">确认密码</span>
            <input id="signup-password2" type="password" placeholder="再次输入密码" autocomplete="new-password" />
            <span class="field-error" id="signup-password2-error"></span>
          </label>

          <label class="agree">
            <input type="checkbox" id="agree" />
            <span>我已阅读并同意<a href="#terms">服务条款</a>和<a href="#privacy">隐私政策</a></span>
          </label>
          <span class="field-error" id="agree-error"></span>

          <button type="submit" class="submit-btn">注册</button>
        </form>

        <!-- 找回密码表单 -->
        <form id="forgot-form" class="auth-form" novalidate hidden>
          <label class="field">
            <span class="field-label">邮箱</span>
            <input id="forgot-email" type="email" placeholder="you@example.com" autocomplete="email" />
            <span class="field-error" id="forgot-email-error"></span>
          </label>

          <button type="submit" class="submit-btn">发送重置链接</button>

          <p class="form-note" id="sent-note" hidden>
            如果该邮箱已注册，重置链接会发送到你的邮箱，请查收（含垃圾箱）。
          </p>
        </form>

        <!-- OAuth 第三方登录 (仅在登录模式显示) -->
        <div id="oauth-section">
          <div class="divider"><span>或使用以下方式登录</span></div>
          <div class="oauth-row">
            <button type="button" class="oauth-btn" data-provider="google">
              <span class="oauth-icon">G</span><span>Google</span>
            </button>
            <button type="button" class="oauth-btn" data-provider="github">
              <span class="oauth-icon">GH</span><span>GitHub</span>
            </button>
            <button type="button" class="oauth-btn" data-provider="wechat">
              <span class="oauth-icon">微</span><span>微信</span>
            </button>
          </div>
        </div>

        <!-- 页脚提示 -->
        <p class="signup-hint" id="footer-hint">
          还没有账户？<a href="#" data-switch="signup">立即注册</a>
        </p>
      </div>
    </div>

    <script src="auth.js"></script>
  </body>
</html>
