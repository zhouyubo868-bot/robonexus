<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoboNexus · 注册</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="login-shell">
      <div class="login-card">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="8" width="14" height="11" rx="2.5" />
              <path d="M12 8V4" />
              <circle cx="12" cy="3" r="1.4" fill="currentColor" stroke="none" />
              <circle cx="9.2" cy="13" r="1.3" fill="currentColor" stroke="none" />
              <circle cx="14.8" cy="13" r="1.3" fill="currentColor" stroke="none" />
              <path d="M9.5 16.2h5" />
              <path d="M5 12H2.6" />
              <path d="M19 12h2.4" />
            </svg>
          </span>
          <div class="brand-text">
            <h1>创建账户</h1>
            <p>加入 RoboNexus 机器人控制台</p>
          </div>
        </div>

        <form id="signup-form" novalidate>
          <label class="field">
            <span class="field-label">用户名</span>
            <input
              id="name"
              type="text"
              placeholder="给自己起个名字"
              autocomplete="nickname"
            />
            <span class="field-error" id="name-error"></span>
          </label>

          <label class="field">
            <span class="field-label">邮箱</span>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
            />
            <span class="field-error" id="email-error"></span>
          </label>

          <label class="field">
            <span class="field-label">密码</span>
            <div class="pwd-wrap">
              <input
                id="password"
                type="password"
                placeholder="至少 6 位"
                autocomplete="new-password"
              />
              <button type="button" class="pwd-toggle" id="pwd-toggle" aria-label="显示密码">
                显示
              </button>
            </div>
            <span class="field-error" id="password-error"></span>
          </label>

          <label class="field">
            <span class="field-label">确认密码</span>
            <input
              id="password2"
              type="password"
              placeholder="再次输入密码"
              autocomplete="new-password"
            />
            <span class="field-error" id="password2-error"></span>
          </label>

          <label class="agree">
            <input type="checkbox" id="agree" />
            <span>我已阅读并同意<a href="#terms">服务条款</a>和<a href="#privacy">隐私政策</a></span>
          </label>
          <span class="field-error" id="agree-error"></span>

          <button type="submit" class="submit-btn" id="submit-btn">注册</button>
        </form>

        <p class="signup-hint">
          已有账户？<a href="index.html">返回登录</a>
        </p>
      </div>
    </div>

    <script src="signup.js"></script>
  </body>
</html>
