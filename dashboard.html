<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoboNexus · 控制台</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="robot-detail.css" />
  </head>
  <body class="dashboard-body">
    <!-- 顶部导航栏 -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="brand-mark-small" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="8" width="14" height="11" rx="2.5" />
            <path d="M12 8V4" />
            <circle cx="12" cy="3" r="1.4" fill="currentColor" stroke="none" />
            <circle cx="9.2" cy="13" r="1.3" fill="currentColor" stroke="none" />
            <circle cx="14.8" cy="13" r="1.3" fill="currentColor" stroke="none" />
            <path d="M9.5 16.2h5" />
            <path d="M5 12H2.6" />
            <path d="M19 12h2.4" />
          </svg>
        </span>
        <span class="brand-name">RoboNexus</span>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" id="notifications-btn" aria-label="通知">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
        </button>
        <div class="user-menu">
          <button class="user-btn" id="user-btn">
            <span class="user-avatar">A</span>
            <span class="user-name">Austin</span>
          </button>
        </div>
      </div>
    </header>

    <div class="dashboard-container">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
            </svg>
            <span>仪表盘</span>
          </a>
          <a href="builder.html" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="7" width="20" height="14" rx="2" />
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
            </svg>
            <span>机器人</span>
          </a>
          <a href="builder3d.html" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
              <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
              <line x1="12" y1="22.08" x2="12" y2="12" />
            </svg>
            <span>3D 实验室</span>
          </a>
          <a href="builder3d-advanced.html" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
            </svg>
            <span>真实组装</span>
          </a>
          <a href="#" class="nav-item" id="nav-logs">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
            <span>监控</span>
          </a>
          <a href="#" class="nav-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path d="M12 1v6m0 6v6M5.2 5.2l4.2 4.2m5.2 5.2l4.2 4.2M1 12h6m6 0h6M5.2 18.8l4.2-4.2m5.2-5.2l4.2-4.2" />
            </svg>
            <span>设置</span>
          </a>
        </nav>
      </aside>

      <!-- 主内容区 -->
      <main class="main-content">
        <div class="page-header">
          <h1>仪表盘</h1>
          <button class="btn-primary" id="add-robot-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            添加机器人
          </button>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon stat-icon-primary">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="7" width="20" height="14" rx="2" />
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-label">总机器人</div>
              <div class="stat-value" id="stat-total">—</div>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon stat-icon-success">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-label">在线</div>
              <div class="stat-value" id="stat-online">—</div>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon stat-icon-warning">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-label">告警</div>
              <div class="stat-value" id="stat-alerts">—</div>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon stat-icon-info">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
              </svg>
            </div>
            <div class="stat-content">
              <div class="stat-label">任务执行</div>
              <div class="stat-value" id="stat-tasks">—</div>
            </div>
          </div>
        </div>

        <!-- 机器人列表 -->
        <div class="section">
          <div class="section-header">
            <h2>机器人列表</h2>
            <div class="view-toggle">
              <button class="toggle-btn active" data-view="grid">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <rect x="3" y="3" width="7" height="7" />
                  <rect x="14" y="3" width="7" height="7" />
                  <rect x="14" y="14" width="7" height="7" />
                  <rect x="3" y="14" width="7" height="7" />
                </svg>
              </button>
              <button class="toggle-btn" data-view="list">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="8" y1="6" x2="21" y2="6" />
                  <line x1="8" y1="12" x2="21" y2="12" />
                  <line x1="8" y1="18" x2="21" y2="18" />
                  <line x1="3" y1="6" x2="3.01" y2="6" />
                  <line x1="3" y1="12" x2="3.01" y2="12" />
                  <line x1="3" y1="18" x2="3.01" y2="18" />
                </svg>
              </button>
            </div>
          </div>

          <div class="robots-grid" id="robots-container">
            <!-- 机器人卡片将由 JS 动态生成 -->
          </div>
        </div>

        <!-- 任务调度 -->
        <div class="section">
          <div class="section-header">
            <h2>任务调度</h2>
            <button class="btn-primary" id="new-task-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              新建任务
            </button>
          </div>
          <div class="task-table" id="task-container">
            <!-- 任务行由 JS 动态生成 -->
          </div>
        </div>
      </main>
    </div>

    <!-- 机器人详情模态框 -->
    <div class="detail-overlay" id="detail-overlay" hidden>
      <div class="detail-modal">
        <div class="detail-header">
          <div class="detail-title">
            <h2 id="detail-name">机器人名称</h2>
            <span class="detail-badge" id="detail-badge">未知形态</span>
          </div>
          <button class="detail-close" id="detail-close" aria-label="关闭">×</button>
        </div>
        <div class="detail-body" id="detail-body">
          <!-- JS 渲染 -->
        </div>
        <div class="detail-actions">
          <button class="btn-secondary" id="detail-edit">编辑配置</button>
          <button class="btn-danger" id="detail-delete">删除</button>
        </div>
      </div>
    </div>

    <!-- 新建任务模态框 -->
    <div class="detail-overlay" id="task-overlay" hidden>
      <div class="detail-modal" style="max-width: 420px;">
        <div class="detail-header">
          <div class="detail-title"><h2>新建任务</h2></div>
          <button class="detail-close" id="task-close" aria-label="关闭">×</button>
        </div>
        <div class="detail-body">
          <label class="task-field">
            <span>选择机器人</span>
            <select id="task-robot"></select>
          </label>
          <label class="task-field">
            <span>任务类型</span>
            <select id="task-type">
              <option value="巡检">巡检</option>
              <option value="搬运">搬运</option>
              <option value="清扫">清扫</option>
              <option value="数据采集">数据采集</option>
              <option value="充电">充电</option>
              <option value="远程升级">远程升级</option>
            </select>
          </label>
        </div>
        <div class="detail-actions">
          <button class="btn-secondary" id="task-cancel">取消</button>
          <button class="btn-primary" id="task-submit">下发任务</button>
        </div>
      </div>
    </div>

    <!-- 日志查询抽屉 -->
    <div class="log-drawer-overlay" id="log-overlay" hidden></div>
    <aside class="log-drawer" id="log-drawer" hidden>
      <div class="log-drawer-head">
        <h2>运行日志</h2>
        <button class="detail-close" id="log-close" aria-label="关闭">×</button>
      </div>
      <div class="log-filters">
        <select id="log-filter-robot"><option value="">全部机器人</option></select>
        <select id="log-filter-level">
          <option value="">全部级别</option>
          <option value="info">信息</option>
          <option value="warn">警告</option>
          <option value="error">错误</option>
        </select>
        <input type="text" id="log-filter-keyword" placeholder="搜索消息关键词…" />
      </div>
      <div class="log-list" id="log-list">
        <!-- 日志条目由 JS 渲染 -->
      </div>
    </aside>

    <script src="api.js"></script>
    <script src="realtime.js"></script>
    <script src="notifications.js"></script>
    <script src="robot-parts.js"></script>
    <script src="dashboard.js"></script>
    <script src="tasks.js"></script>
    <script src="logs.js"></script>
  </body>
</html>
